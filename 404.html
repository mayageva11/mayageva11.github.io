<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Maya Erusalimsky</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #080b14;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .logo { width: 72px; height: 72px; margin: 0 auto 1.5rem; }
    .code {
      font-family: 'Sora', sans-serif;
      font-size: clamp(4rem, 15vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(130deg, #00d4ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .test {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 0.85rem;
      color: #94a3b8;
      background: #0a0e18;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 3px solid #ff6b6b;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-align: left;
      margin-bottom: 1.75rem;
      line-height: 1.7;
    }
    .test .fail { color: #ff6b6b; }
    .test .dim  { color: #7c8797; }
    a.btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #00d4ff;
      color: #080b14;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 8px;
      text-decoration: none;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    a.btn:hover {
      box-shadow: 0 0 22px rgba(0, 212, 255, 0.45);
      transform: translateY(-1px);
    }
    a.btn:focus-visible { outline: 2px solid #00d4ff; outline-offset: 3px; }
  </style>
</head>
<body>
  <main class="wrap">
    <svg class="logo" viewBox="0 0 120 120" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#00d4ff"/>
          <stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
      </defs>
      <rect x="8" y="8" width="104" height="104" rx="26" fill="#0f1420" stroke="url(#g)" stroke-width="5"/>
      <path d="M32 82 V46 L54 70" fill="none" stroke="url(#g)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 70 L66 84 L92 44" fill="none" stroke="#00d4ff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <p class="code">404</p>
    <h1>This test case doesn't exist</h1>

    <div class="test" role="img" aria-label="A failing test result: expected page, received undefined">
      <span class="fail">✗ page.spec.ts &gt; requested URL</span><br>
      <span class="dim">&nbsp;&nbsp;Expected: page</span><br>
      <span class="dim">&nbsp;&nbsp;Received: undefined</span>
    </div>

    <a class="btn" href="/">← Back to the passing suite</a>
  </main>
</body>
</html>
